<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Fullstack Learning</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }
      body {
        margin: 0;
        background: linear-gradient(135deg, #0f172a, #1d4ed8);
        color: #f8fafc;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 24px 72px;
      }
      .card {
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      }
      h1 { font-size: 2rem; margin-top: 0; }
      h2 { margin-top: 24px; }
      ul { line-height: 1.8; }
      a { color: #93c5fd; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>AI Fullstack Learning</h1>
        <p>这是一个用于记录 Java 与 AI 全栈学习路线的静态页面，已经准备好部署到 Vercel。</p>
        <h2>学习阶段</h2>
        <ul>
          <li>Java 基础与面向对象编程</li>
          <li>Web 开发与数据库基础</li>
          <li>Spring Boot 与工程化实践</li>
          <li>AI 应用开发与大模型技术</li>
        </ul>
        <h2>项目仓库</h2>
        <p><a href="https://github.com/vincentic/ai-fullstack-learning">GitHub 仓库</a></p>
      </section>
    </main>
  </body>
</html>
